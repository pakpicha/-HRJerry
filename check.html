<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบข้อมูล · Smart HR</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #f1f5f9; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", Arial, sans-serif; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 14px 60px; }
  header { background: linear-gradient(90deg, #1d4ed8, #312e81); color: #fff; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.12); }
  .hd { max-width: 760px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .hd .ico { font-size: 26px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header p { font-size: 12px; margin: 2px 0 0; color: #c7d2fe; }
  .back { margin-left: auto; color: #c7d2fe; text-decoration: none; font-size: 13px; font-weight: 700; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 18px; margin-top: 16px; }
  .card h2 { font-size: 15px; margin: 0 0 4px; color: #0f172a; }
  .card .sub { font-size: 12px; color: #64748b; margin: 0 0 4px; }
  .refresh { background: #2563eb; color: #fff; border: 0; border-radius: 11px; padding: 11px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
  .ok-banner { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; border-radius: 12px; padding: 16px; text-align: center; font-weight: 700; }
  .grp { margin-top: 14px; }
  .grp h3 { font-size: 14px; margin: 0 0 8px; color: #0f172a; }
  .badcount { font-size: 12px; font-weight: 700; color: #b91c1c; background: #fef2f2; padding: 2px 9px; border-radius: 999px; margin-left: 6px; }
  .nm { display: inline-flex; align-items: center; gap: 6px; background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; border-radius: 999px; padding: 5px 12px; font-size: 13px; margin: 0 6px 6px 0; }
  .nm b { color: #c2410c; }
  .reg { margin-top: 18px; }
  .reg .pill { display: inline-block; background: #f1f5f9; border-radius: 999px; padding: 4px 11px; font-size: 12px; color: #475569; margin: 0 5px 5px 0; }
  .empty { color: #94a3b8; font-size: 13px; }
  .hint { font-size: 12px; color: #0369a1; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 10px 12px; margin-top: 14px; line-height: 1.6; }
  #deny { display:none; max-width:420px; margin:80px auto; background:#fff; border:1px solid #e2e8f0; border-radius:18px; padding:30px; text-align:center; }
  #deny a { display:inline-block; margin-top:14px; background:#2563eb; color:#fff; text-decoration:none; padding:10px 18px; border-radius:10px; font-weight:700; }
</style>
</head>
<body>

<div id="deny"><h2>เฉพาะผู้ดูแลระบบ</h2><p>หน้านี้สำหรับ Admin เท่านั้น</p><a href="index.html">กลับหน้าหลัก</a></div>

<div id="app" style="display:none">
<header>
  <div class="hd">
    <span class="ico">🔍</span>
    <div><h1>ตรวจสอบข้อมูล</h1><p>หาชื่อที่ไม่ตรงกับทะเบียนพนักงาน (ข้อมูลไม่ลิงก์กัน)</p></div>
    <a class="back" href="index.html">‹ หน้าหลัก</a>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <h2>ตรวจชื่อทุกแท็บเทียบกับทะเบียน</h2>
    <p class="sub">สแกน ลงเวลา · ใบลา · เงินเดือน · เบี้ยพิเศษ · เปลี่ยนกะ · บัญชีล็อกอิน แล้วบอกว่ามีชื่อไหน "ไม่ตรง" กับทะเบียนพนักงาน</p>
    <button class="refresh" onclick="runCheck()">🔍 ตรวจสอบเลย</button>
  </div>

  <div id="result"></div>
</div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbx0Fh8WgXqNHemrXy2lXZSj9oLZ_hZd1lHLGii87Zze_cAfIWBKcYl459Ex6HKO5Jbq/exec';

var USER = null;
try { USER = JSON.parse(localStorage.getItem('hr_user') || 'null'); } catch (e) { USER = null; }
if (!USER || String(USER.role).trim().toLowerCase() !== 'admin') {
  document.getElementById('deny').style.display = 'block';
} else {
  document.getElementById('app').style.display = 'block';
}
var TOKEN = USER ? (USER.token || '') : '';
function sessionExpired() { try { localStorage.removeItem('hr_user'); } catch (e) {} window.location.href = 'index.html'; }

function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function norm(s) { return String(s == null ? '' : s).replace(/\s+/g, ' ').trim(); }

function jsonp(sheet, done) {
  var cb = 'jp_' + sheet + '_' + Date.now();
  var sc = document.createElement('script');
  window[cb] = function (rows) { if (rows && rows.error) { clean(); sessionExpired(); return; } done(rows || []); clean(); };
  function clean() { try { delete window[cb]; } catch (e) { window[cb] = undefined; } if (sc.parentNode) sc.parentNode.removeChild(sc); }
  sc.onerror = function () { done(null); clean(); };
  sc.src = API_URL + '?sheet=' + sheet + '&token=' + encodeURIComponent(TOKEN) + '&callback=' + cb + '&t=' + Date.now();
  document.body.appendChild(sc);
}

/* แท็บที่จะตรวจ: ชื่อพนักงานอยู่คอลัมน์ index ที่กำหนด */
var TARGETS = [
  { sheet: 'Attendance', col: 1, label: 'ลงเวลา' },
  { sheet: 'Requests', col: 1, label: 'ใบลา' },
  { sheet: 'Payroll', col: 1, label: 'เงินเดือน' },
  { sheet: 'Allowances', col: 1, label: 'เบี้ยพิเศษ (รายเดือน)' },
  { sheet: 'FixedAllowances', col: 0, label: 'เบี้ยพิเศษ (ประจำ)' },
  { sheet: 'ShiftChanges', col: 1, label: 'ขอเปลี่ยนกะ' },
  { sheet: 'Users', col: 3, label: 'บัญชีล็อกอิน' }
];

var REG = {};       /* ชื่อในทะเบียน (normalized) -> true */
var REG_NAMES = []; /* ชื่อจริงในทะเบียน */

function runCheck() {
  document.getElementById('result').innerHTML = '<div class="card"><div class="empty">กำลังตรวจสอบ...</div></div>';
  jsonp('Employees', function (emp) {
    if (emp === null) { document.getElementById('result').innerHTML = '<div class="card"><div class="empty">โหลดทะเบียนไม่ได้ — ตรวจ redeploy</div></div>'; return; }
    var list = (emp && emp.length > 1) ? emp.slice(1) : [];
    REG = {}; REG_NAMES = [];
    for (var i = 0; i < list.length; i++) { var n = norm(list[i][1]); if (n) { REG[n] = true; REG_NAMES.push(list[i][1]); } }
    checkNext(0, []);
  });
}

function checkNext(idx, acc) {
  if (idx >= TARGETS.length) { renderResult(acc); return; }
  var t = TARGETS[idx];
  jsonp(t.sheet, function (rows) {
    var bad = {};
    var arr = (rows && rows.length > 1) ? rows.slice(1) : [];
    for (var i = 0; i < arr.length; i++) {
      var raw = arr[i][t.col];
      var n = norm(raw);
      if (!n) continue;
      if (!REG[n]) { if (!bad[n]) bad[n] = { name: raw, count: 0 }; bad[n].count++; }
    }
    var badList = [];
    for (var k in bad) { if (bad.hasOwnProperty(k)) badList.push(bad[k]); }
    acc.push({ label: t.label, sheet: t.sheet, bad: badList });
    checkNext(idx + 1, acc);
  });
}

function renderResult(acc) {
  var totalBad = 0;
  for (var i = 0; i < acc.length; i++) totalBad += acc[i].bad.length;

  var html = '<div class="card">';
  if (totalBad === 0) {
    html += '<div class="ok-banner">✅ ทุกชื่อตรงกับทะเบียน — ข้อมูลลิงก์กันครบ</div>';
  } else {
    html += '<h2 style="color:#b91c1c">พบชื่อที่ไม่ตรงทะเบียน ' + totalBad + ' รายการ</h2>' +
      '<p class="sub">ชื่อเหล่านี้ในข้อมูลไม่ตรงกับทะเบียน → เงินเดือน/กะ/ค่าลา จะไม่จับคู่ ต้องแก้ให้ตรง</p>';
    for (var g = 0; g < acc.length; g++) {
      if (!acc[g].bad.length) continue;
      html += '<div class="grp"><h3>' + esc(acc[g].label) + '<span class="badcount">' + acc[g].bad.length + '</span></h3>';
      for (var b = 0; b < acc[g].bad.length; b++) {
        html += '<span class="nm"><b>' + esc(acc[g].bad[b].name) + '</b> · ' + acc[g].bad[b].count + ' แถว</span>';
      }
      html += '</div>';
    }
    html += '<div class="hint">💡 วิธีแก้: เข้าไปในชีตแท็บนั้น แก้ชื่อให้ตรงกับทะเบียนเป๊ะ (รวมเว้นวรรค) — หรือถ้าทะเบียนสะกดผิด ให้แก้ที่ทะเบียนแทน · ชื่อในทะเบียนที่ถูกต้องดูด้านล่าง</div>';
  }

  html += '<div class="reg"><h3 style="font-size:13px;color:#475569;margin:0 0 8px">ชื่อในทะเบียน (' + REG_NAMES.length + ' คน):</h3>';
  if (!REG_NAMES.length) html += '<span class="empty">ยังไม่มีพนักงานในทะเบียน</span>';
  for (var r = 0; r < REG_NAMES.length; r++) html += '<span class="pill">' + esc(REG_NAMES[r]) + '</span>';
  html += '</div></div>';

  document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
