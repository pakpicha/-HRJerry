<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart HR &amp; Payroll</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #f1f5f9; color: #1e293b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", "Helvetica Neue", Arial, sans-serif; }

  /* ===== LOGIN VIEW ===== */
  #loginView { min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1d4ed8, #312e81); padding: 20px; }
  .box { background: #fff; width: 100%; max-width: 380px; border-radius: 22px; padding: 30px 26px;
    box-shadow: 0 18px 50px rgba(0,0,0,.28); }
  .logo { text-align: center; font-size: 40px; margin-bottom: 6px; }
  .box h1 { text-align: center; font-size: 20px; margin: 0 0 2px; color: #0f172a; }
  .box .sub { text-align: center; font-size: 12px; color: #64748b; margin: 0 0 22px; }
  .box label { display: block; font-size: 12px; color: #475569; font-weight: 600; margin: 12px 0 5px; }
  .box input { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; color: #1e293b; font-family: inherit; }
  .box input:focus { outline: none; border-color: #2563eb; }
  .box button { width: 100%; margin-top: 20px; background: #2563eb; color: #fff; border: 0; padding: 13px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .box button:active { background: #1d4ed8; }
  .box button:disabled { background: #93c5fd; }
  .err { display: none; margin-top: 14px; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; padding: 10px 12px; border-radius: 10px; font-size: 13px; text-align: center; }
  .err.show { display: block; }
  .hint { margin-top: 18px; font-size: 11px; color: #94a3b8; text-align: center; line-height: 1.6; }

  /* ===== HUB VIEW ===== */
  #hubView { display: none; }
  header { background: linear-gradient(90deg, #1d4ed8, #312e81); color: #fff; padding: 22px 16px; box-shadow: 0 2px 14px rgba(0,0,0,.14); }
  .hd { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
  .hd .ico { font-size: 30px; }
  header h1 { font-size: 20px; margin: 0; font-weight: 800; }
  header p { font-size: 12px; margin: 3px 0 0; color: #c7d2fe; }
  .logout { margin-left: auto; background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .who { max-width: 900px; margin: 16px auto 0; padding: 0 16px; display: flex; align-items: center; gap: 10px; }
  .ava { width: 40px; height: 40px; border-radius: 50%; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .who .nm { font-weight: 700; color: #0f172a; }
  .who .role { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px; }
  .role.admin { background: #fef3c7; color: #92400e; }
  .role.employee { background: #dbeafe; color: #1d4ed8; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 18px; }
  @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
  a.tile { text-decoration: none; color: inherit; background: #fff; border: 1px solid #e2e8f0; border-radius: 18px; padding: 22px; display: flex; gap: 16px; align-items: flex-start; transition: transform .12s, box-shadow .12s, border-color .12s; }
  a.tile:active { transform: scale(.98); }
  a.tile:hover { box-shadow: 0 6px 20px rgba(30,64,175,.12); border-color: #c7d2fe; }
  .tile .badge { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .b1 { background: #dbeafe; } .b2 { background: #dcfce7; } .b3 { background: #ede9fe; } .b4 { background: #ffedd5; }
  .tile h2 { font-size: 16px; margin: 2px 0 4px; color: #0f172a; }
  .tile p { font-size: 12px; margin: 0; color: #64748b; line-height: 1.5; }
  .arrow { margin-left: auto; color: #cbd5e1; font-size: 20px; align-self: center; }
  footer { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 26px; }
</style>
</head>
<body>

  <!-- ========== หน้าล็อกอิน ========== -->
  <div id="loginView">
    <div class="box">
      <div class="logo">🛡️</div>
      <h1>Smart HR &amp; Payroll</h1>
      <p class="sub">เข้าสู่ระบบเพื่อใช้งาน</p>
      <label>ชื่อผู้ใช้ (username)</label>
      <input type="text" id="username" autocomplete="username" placeholder="เช่น admin">
      <label>รหัสผ่าน</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="รหัสผ่าน">
      <button id="btn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div id="err" class="err"></div>
      <div class="hint">ครั้งแรกให้สร้างแท็บ Users ในชีต แล้วเพิ่มผู้ใช้ก่อน</div>
    </div>
  </div>

  <!-- ========== หน้าเมนูหลัก ========== -->
  <div id="hubView">
    <header>
      <div class="hd">
        <span class="ico">🛡️</span>
        <div>
          <h1>Smart HR &amp; Payroll</h1>
          <p>ระบบบริหารบุคคล · เชื่อม Google Sheet</p>
        </div>
        <button class="logout" onclick="logout()">ออกจากระบบ</button>
      </div>
    </header>
    <div class="who">
      <div class="ava" id="ava">👤</div>
      <div><span class="nm" id="whoName">—</span> <span class="role" id="whoRole">—</span></div>
    </div>
    <div class="wrap">
      <div class="grid" id="menu"></div>
      <footer>Smart HR &amp; Payroll · หน้าหลัก</footer>
    </div>
  </div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbx0Fh8WgXqNHemrXy2lXZSj9oLZ_hZd1lHLGii87Zze_cAfIWBKcYl459Ex6HKO5Jbq/exec';

var TILES_ADMIN = [
  { href: 'attendance.html', b: 'b1', icon: '⏱️', t: 'ลงเวลาทำงาน', d: 'บันทึกเข้า–ออก คำนวณสาย/ชดเชย/ค่าปรับ' },
  { href: 'employees.html', b: 'b2', icon: '👥', t: 'ทะเบียนพนักงาน', d: 'ข้อมูลพนักงาน เงินเดือน ยอดสะสมยกมา' },
  { href: 'requests.html', b: 'b3', icon: '📅', t: 'ใบลา / WFH', d: 'อนุมัติ/ปฏิเสธ และนับโควต้า' },
  { href: 'payroll.html', b: 'b4', icon: '🧧', t: 'เงินเดือน + โบนัสตรุษจีน', d: 'คิดเงินเดือนสุทธิ ออกสลิป' },
  { href: 'users.html', b: 'b3', icon: '🔐', t: 'จัดการผู้ใช้', d: 'เพิ่ม/ลบ/รีเซ็ตรหัส บัญชีเข้าระบบ' }
];
var TILES_EMP = [
  { href: 'attendance.html', b: 'b1', icon: '⏱️', t: 'ลงเวลาของฉัน', d: 'บันทึกเวลาเข้า–ออกงาน' },
  { href: 'requests.html', b: 'b3', icon: '📅', t: 'ยื่นใบลา / WFH', d: 'ส่งคำร้องขอลาหรือทำงานที่บ้าน' }
];

/* ===== แสดงหน้าตามสถานะล็อกอิน ===== */
function getUser() { try { return JSON.parse(localStorage.getItem('hr_user') || 'null'); } catch (e) { return null; } }

function showHub(user) {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('hubView').style.display = 'block';
  var isAdmin = (user.role === 'admin');
  document.getElementById('whoName').textContent = user.name || (isAdmin ? 'ผู้ดูแลระบบ' : 'พนักงาน');
  var roleEl = document.getElementById('whoRole');
  roleEl.textContent = isAdmin ? 'ผู้ดูแลระบบ (Admin)' : 'พนักงาน (Employee)';
  roleEl.className = 'role ' + (isAdmin ? 'admin' : 'employee');
  document.getElementById('ava').textContent = isAdmin ? '🛠️' : '👤';
  var tiles = isAdmin ? TILES_ADMIN : TILES_EMP, html = '';
  for (var i = 0; i < tiles.length; i++) {
    var x = tiles[i];
    html += '<a class="tile" href="' + x.href + '"><div class="badge ' + x.b + '">' + x.icon + '</div>' +
      '<div><h2>' + x.t + '</h2><p>' + x.d + '</p></div><span class="arrow">\u203a</span></a>';
  }
  document.getElementById('menu').innerHTML = html;
}

function showLogin() {
  document.getElementById('hubView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

function logout() { try { localStorage.removeItem('hr_user'); } catch (e) {} showLogin(); }

/* ===== ล็อกอิน ===== */
function showErr(t) { var el = document.getElementById('err'); el.textContent = t; el.className = 'err show'; }
function setBusy(b) { var btn = document.getElementById('btn'); btn.disabled = b; btn.textContent = b ? 'กำลังตรวจสอบ...' : 'เข้าสู่ระบบ'; }

function doLogin() {
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value;
  if (!u || !p) { showErr('กรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
  document.getElementById('err').className = 'err'; setBusy(true);
  var nonce = 'n' + Date.now() + '_' + Math.floor(Math.random() * 1e9);
  fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'login', username: u, password: p, nonce: nonce }) })
    .then(function () { setTimeout(function () { checkSession(nonce, 5); }, 1500); })
    .catch(function () { setTimeout(function () { checkSession(nonce, 5); }, 1500); });
}

function checkSession(nonce, tries) {
  var cb = 'sess_' + Date.now();
  var script = document.createElement('script');
  window[cb] = function (res) {
    clean();
    if (res && res.found) {
      if (res.ok) {
        var user = { role: res.role, name: res.name };
        try { localStorage.setItem('hr_user', JSON.stringify(user)); } catch (e) {}
        setBusy(false); showHub(user);
      } else { setBusy(false); showErr('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'); }
    } else if (tries > 0) {
      setTimeout(function () { checkSession(nonce, tries - 1); }, 1500);
    } else { setBusy(false); showErr('หมดเวลารอ ลองใหม่อีกครั้ง'); }
  };
  function clean() { try { delete window[cb]; } catch (e) { window[cb] = undefined; } if (script.parentNode) script.parentNode.removeChild(script); }
  script.onerror = function () { clean(); setBusy(false); showErr('เชื่อมต่อไม่ได้ ลองใหม่'); };
  script.src = API_URL + '?action=session&nonce=' + encodeURIComponent(nonce) + '&callback=' + cb + '&t=' + Date.now();
  document.body.appendChild(script);
}

/* ===== เริ่มต้น ===== */
(function init() {
  var pw = document.getElementById('password');
  if (pw) pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
  var u = getUser();
  if (u && u.role) showHub(u); else showLogin();
})();
</script>
</body>
</html>
