<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart HR &amp; Payroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7fb; --card: #ffffff; --ink: #1f2433; --muted: #8a90a2;
    --line: #eceef4; --primary: #4f46e5; --primary2: #7c3aed;
    --shadow: 0 6px 24px rgba(40,44,80,.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Prompt", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 400; }

  /* ===================== LOGIN ===================== */
  #loginView { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 22px;
    background: radial-gradient(120% 120% at 0% 0%, #6366f1 0%, #4f46e5 38%, #3730a3 100%); }
  .login-card { background: var(--card); width: 100%; max-width: 390px; border-radius: 26px; padding: 34px 28px 30px;
    box-shadow: 0 24px 60px rgba(20,20,60,.32); }
  .brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
  .brand .mark { width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; background: linear-gradient(135deg, #6366f1, #7c3aed); box-shadow: 0 10px 24px rgba(99,102,241,.4); margin-bottom: 14px; }
  .brand h1 { font-size: 21px; font-weight: 600; margin: 0; letter-spacing: -.3px; }
  .brand p { font-size: 13px; color: var(--muted); margin: 4px 0 0; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; color: #5b617a; font-weight: 500; margin-bottom: 6px; }
  .field input { width: 100%; padding: 13px 15px; border: 1.5px solid var(--line); border-radius: 14px; font-size: 15px;
    color: var(--ink); font-family: inherit; background: #fbfbfe; transition: border-color .15s, background .15s; }
  .field input:focus { outline: none; border-color: var(--primary); background: #fff; }
  .login-btn { width: 100%; margin-top: 8px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: 0;
    padding: 15px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
    box-shadow: 0 10px 22px rgba(79,70,229,.32); transition: transform .1s, opacity .15s; }
  .login-btn:active { transform: scale(.985); }
  .login-btn:disabled { opacity: .6; }
  .err { display: none; margin-top: 14px; background: #fef2f2; color: #c0322f; border: 1px solid #fbd5d3;
    padding: 11px 13px; border-radius: 12px; font-size: 13px; text-align: center; }
  .err.show { display: block; }
  .login-hint { margin-top: 18px; font-size: 11.5px; color: #aab0c2; text-align: center; line-height: 1.6; }

  /* ===================== HUB ===================== */
  #hubView { display: none; }
  .appbar { position: sticky; top: 0; z-index: 20; background: rgba(246,247,251,.82);
    backdrop-filter: saturate(160%) blur(12px); -webkit-backdrop-filter: saturate(160%) blur(12px);
    border-bottom: 1px solid var(--line); }
  .appbar-in { max-width: 760px; margin: 0 auto; padding: 13px 18px; display: flex; align-items: center; gap: 12px; }
  .appbar .mark { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; background: linear-gradient(135deg, #6366f1, #7c3aed); box-shadow: 0 6px 14px rgba(99,102,241,.35); }
  .appbar .name { font-weight: 600; font-size: 16px; letter-spacing: -.2px; line-height: 1.1; }
  .appbar .tag { font-size: 11px; color: var(--muted); }
  .logout { margin-left: auto; background: #fff; border: 1px solid var(--line); color: #5b617a;
    width: 40px; height: 40px; border-radius: 12px; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; }
  .logout:active { background: #f1f2f7; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 18px 18px 70px; }
  .hello { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border-radius: 22px; padding: 22px 22px;
    box-shadow: 0 14px 30px rgba(79,70,229,.28); position: relative; overflow: hidden; }
  .hello::after { content: ""; position: absolute; right: -30px; top: -30px; width: 130px; height: 130px;
    background: rgba(255,255,255,.12); border-radius: 50%; }
  .hello .hi { font-size: 14px; opacity: .9; }
  .hello .who { font-size: 22px; font-weight: 600; margin-top: 2px; letter-spacing: -.3px; }
  .hello .chip { display: inline-block; margin-top: 12px; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3);
    padding: 5px 13px; border-radius: 999px; font-size: 12px; font-weight: 500; }

  .section-title { font-size: 13px; font-weight: 600; color: #9298ab; margin: 26px 4px 12px; letter-spacing: .2px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 560px) { .grid { grid-template-columns: 1fr 1fr; } }

  a.tile { text-decoration: none; color: inherit; background: var(--card); border: 1px solid var(--line);
    border-radius: 20px; padding: 17px; display: flex; gap: 15px; align-items: center; box-shadow: var(--shadow);
    transition: transform .12s ease, box-shadow .15s ease; }
  a.tile:active { transform: scale(.975); }
  a.tile:hover { box-shadow: 0 10px 30px rgba(40,44,80,.12); }
  .tile .badge { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center;
    font-size: 25px; flex-shrink: 0; }
  .c-blue { background: #e8edff; } .c-green { background: #e2f7ee; } .c-violet { background: #efe9fe; }
  .c-amber { background: #fff1de; } .c-rose { background: #ffe9ee; } .c-cyan { background: #e1f6fb; }
  .tile .t { font-size: 15.5px; font-weight: 600; letter-spacing: -.2px; }
  .tile .d { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
  .tile .chev { margin-left: auto; color: #cfd3e0; font-size: 22px; }
  footer { text-align: center; font-size: 11px; color: #b7bccb; margin-top: 30px; }
</style>
</head>
<body>

  <!-- ========== ล็อกอิน ========== -->
  <div id="loginView">
    <div class="login-card">
      <div class="brand">
        <div class="mark">🪪</div>
        <h1>Smart HR &amp; Payroll</h1>
        <p>ระบบบริหารงานบุคคล</p>
      </div>
      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="username" autocomplete="username" placeholder="กรอกชื่อผู้ใช้">
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="กรอกรหัสผ่าน">
      </div>
      <button class="login-btn" id="btn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div id="err" class="err"></div>
      <div class="login-hint">ใช้บัญชีที่ผู้ดูแลระบบสร้างให้</div>
    </div>
  </div>

  <!-- ========== หน้าหลัก ========== -->
  <div id="hubView">
    <div class="appbar">
      <div class="appbar-in">
        <div class="mark">🪪</div>
        <div>
          <div class="name">Smart HR</div>
          <div class="tag">ระบบบริหารงานบุคคล</div>
        </div>
        <button class="logout" onclick="logout()" title="ออกจากระบบ">⏻</button>
      </div>
    </div>
    <div class="wrap">
      <div class="hello">
        <div class="hi">ยินดีต้อนรับ 👋</div>
        <div class="who" id="whoName">—</div>
        <span class="chip" id="whoRole">—</span>
      </div>
      <div id="menu"></div>
      <footer>Smart HR &amp; Payroll</footer>
    </div>
  </div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbx0Fh8WgXqNHemrXy2lXZSj9oLZ_hZd1lHLGii87Zze_cAfIWBKcYl459Ex6HKO5Jbq/exec';

var GROUPS_ADMIN = [
  { title: 'งานประจำวัน', items: [
    { href: 'attendance.html', c: 'c-blue', icon: '⏱️', t: 'ลงเวลาทำงาน', d: 'บันทึกเข้า–ออก คำนวณสาย/ค่าปรับ' },
    { href: 'requests.html', c: 'c-violet', icon: '📅', t: 'ใบลา / WFH', d: 'อนุมัติ ปฏิเสธ และนับโควต้า' },
    { href: 'payroll.html', c: 'c-rose', icon: '🧧', t: 'เงินเดือน', d: 'คิดเงินเดือนสุทธิ ออกสลิป' },
    { href: 'employees.html', c: 'c-green', icon: '👥', t: 'ทะเบียนพนักงาน', d: 'ข้อมูลพนักงาน กะ OT ยอดยกมา' }
  ]},
  { title: 'เครื่องมือ & ตั้งค่า', items: [
    { href: 'import.html', c: 'c-cyan', icon: '📥', t: 'นำเข้าเวลาตอกบัตร', d: 'อัปไฟล์จากเครื่องสแกน' },
    { href: 'holidays.html', c: 'c-amber', icon: '📅', t: 'วันหยุดประจำปี', d: 'วันหยุดนักขัตฤกษ์ / พิเศษ' },
    { href: 'users.html', c: 'c-violet', icon: '🔐', t: 'จัดการผู้ใช้', d: 'เพิ่ม ลบ รีเซ็ตรหัสผ่าน' },
    { href: 'check.html', c: 'c-blue', icon: '🔍', t: 'ตรวจสอบข้อมูล', d: 'หาชื่อที่ไม่ตรงทะเบียน' }
  ]}
];
var GROUPS_EMP = [
  { title: 'เมนูของฉัน', items: [
    { href: 'attendance.html', c: 'c-blue', icon: '⏱️', t: 'ลงเวลาของฉัน', d: 'บันทึกเวลาเข้า–ออกงาน' },
    { href: 'requests.html', c: 'c-violet', icon: '📅', t: 'ยื่นใบลา / WFH', d: 'ขอลาหรือทำงานที่บ้าน' }
  ]}
];

function getUser() { try { return JSON.parse(localStorage.getItem('hr_user') || 'null'); } catch (e) { return null; } }

function tileHTML(x) {
  return '<a class="tile" href="' + x.href + '"><div class="badge ' + x.c + '">' + x.icon + '</div>' +
    '<div><div class="t">' + x.t + '</div><div class="d">' + x.d + '</div></div><span class="chev">\u203a</span></a>';
}

function showHub(user) {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('hubView').style.display = 'block';
  var isAdmin = (String(user.role).trim().toLowerCase() === 'admin');
  document.getElementById('whoName').textContent = user.name || (isAdmin ? 'ผู้ดูแลระบบ' : 'พนักงาน');
  document.getElementById('whoRole').textContent = isAdmin ? '🛠️ ผู้ดูแลระบบ' : '👤 พนักงาน';

  var groups = isAdmin ? GROUPS_ADMIN : GROUPS_EMP, html = '';
  for (var g = 0; g < groups.length; g++) {
    html += '<div class="section-title">' + groups[g].title + '</div><div class="grid">';
    for (var i = 0; i < groups[g].items.length; i++) html += tileHTML(groups[g].items[i]);
    html += '</div>';
  }
  document.getElementById('menu').innerHTML = html;
}

function showLogin() {
  document.getElementById('hubView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}
function logout() { try { localStorage.removeItem('hr_user'); } catch (e) {} showLogin(); }

function showErr(t) { var el = document.getElementById('err'); el.textContent = t; el.className = 'err show'; }
function setBusy(b) { var btn = document.getElementById('btn'); btn.disabled = b; btn.textContent = b ? 'กำลังตรวจสอบ...' : 'เข้าสู่ระบบ'; }

function doLogin() {
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value;
  if (!u || !p) { showErr('กรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
  document.getElementById('err').className = 'err'; setBusy(true);
  var nonce = 'n' + Date.now() + '_' + Math.floor(Math.random() * 1e9);
  fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'login', username: u, password: p, nonce: nonce }) })
    .then(function () { setTimeout(function () { checkSession(nonce, 5); }, 1500); })
    .catch(function () { setTimeout(function () { checkSession(nonce, 5); }, 1500); });
}

function checkSession(nonce, tries) {
  var cb = 'sess_' + Date.now();
  var script = document.createElement('script');
  window[cb] = function (res) {
    clean();
    if (res && res.found) {
      if (res.ok) {
        var user = { role: res.role, name: res.name, token: res.token };
        try { localStorage.setItem('hr_user', JSON.stringify(user)); } catch (e) {}
        setBusy(false); showHub(user);
      } else { setBusy(false); showErr('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'); }
    } else if (tries > 0) {
      setTimeout(function () { checkSession(nonce, tries - 1); }, 1500);
    } else { setBusy(false); showErr('หมดเวลารอ ลองใหม่อีกครั้ง'); }
  };
  function clean() { try { delete window[cb]; } catch (e) { window[cb] = undefined; } if (script.parentNode) script.parentNode.removeChild(script); }
  script.onerror = function () { clean(); setBusy(false); showErr('เชื่อมต่อไม่ได้ ลองใหม่'); };
  script.src = API_URL + '?action=session&nonce=' + encodeURIComponent(nonce) + '&callback=' + cb + '&t=' + Date.now();
  document.body.appendChild(script);
}

(function init() {
  var pw = document.getElementById('password');
  if (pw) pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
  var u = getUser();
  if (u && u.role) showHub(u); else showLogin();
})();
</script>
</body>
</html>
